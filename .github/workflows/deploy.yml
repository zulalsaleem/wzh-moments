# ─── WORKFLOW NAME ────────────────────────────
name: CD - Deploy to Production

# ─── TRIGGER ──────────────────────────────────
# ONLY runs when pushing to main branch
# Not on develop or feature branches!
on:
  push:
    branches: [ main ]

jobs:

  # ════════════════════════════════════════════
  # JOB 1: DEPLOY BACKEND
  # Triggers Render to pull latest code
  # ════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 

      # Build with version tag (commit SHA)
      # This creates unique tag for each deployment
      # Example: wzh-backend:a1b2c3d4
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wzh-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wzh-backend:${{ github.sha }} \
            ./wzh-moments-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wzh-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wzh-backend:${{ github.sha }}

      # Tell Render to deploy new version
      # Render pulls latest code and redeploys
      - name: Trigger Render deployment
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Deployment triggered
        run: echo "Backend deployment triggered on Render ✅"

  # ════════════════════════════════════════════
  # JOB 2: DEPLOY FRONTEND
  # Vercel auto-deploys from GitHub
  # Just build and push Docker image
  # ════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    # Deploy frontend AFTER backend is deployed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://wzh-moments-backend.onrender.com/api \
            --build-arg VITE_SOCKET_URL=https://wzh-moments-backend.onrender.com \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wzh-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wzh-frontend:${{ github.sha }} \
            ./wzh-moments-frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wzh-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wzh-frontend:${{ github.sha }}

      - name: Frontend image updated
        run: echo "Frontend Docker image updated on Docker Hub ✅"

  # ════════════════════════════════════════════
  # JOB 3: NOTIFY DEPLOYMENT COMPLETE
  # Summary of what was deployed
  # ════════════════════════════════════════════
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Deployment complete
        run: |
          echo "════════════════════════════════"
          echo "✅ WZH Moments Deployed!"
          echo "Backend: https://wzh-moments-backend.onrender.com"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "════════════════════════════════"